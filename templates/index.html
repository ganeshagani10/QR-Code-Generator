<!DOCTYPE html>
<html>
<head>
    <title>UPI QR Generator</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        img {
            margin-top: 15px;
        }

        .download-btn {
            margin-top: 10px;
            display: inline-block;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>💳 UPI QR Generator</h2>

    <form method="POST">
        <input type="text" name="upi_id" placeholder="Enter UPI ID" value="{{ upi_id }}" required>

        <input type="text" name="name" placeholder="Enter Name" value="{{ name }}" required>

        <input type="text" name="amount" placeholder="Enter Amount (optional)" value="{{ amount }}">

        <input type="text" name="note" placeholder="Enter Note (optional)" value="{{ note }}">

        <br><br>
        <button type="submit">Generate QR</button>
    </form>

    {% if qr_generated %}
        <h3>Your QR Code:</h3>

        <img src="{{ url_for('static', filename='qr.png') }}" width="200">

        <br>

        <a href="{{ url_for('static', filename='qr.png') }}" download class="download-btn">
            <button>Download QR</button>
        </a>
    {% endif %}
</div>

</body>
</html>
