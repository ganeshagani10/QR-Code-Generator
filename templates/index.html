<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QuickPay - UPI QR Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #0f172a;
    color: white;
}

/* Layout */
.wrapper {
    display: flex;
    min-height: 100vh;
}

/* LEFT SIDE */
.left {
    flex: 1;
    padding: 60px;
    background: linear-gradient(135deg, #1e293b, #0f172a);
}

.brand {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 20px;
}

.tagline {
    font-size: 32px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 20px;
}

.subtext {
    opacity: 0.7;
    margin-bottom: 30px;
}

.features {
    margin-top: 30px;
}

.feature {
    margin-bottom: 15px;
    opacity: 0.9;
}

/* RIGHT SIDE */
.right {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CARD */
.card {
    background: #1e293b;
    padding: 30px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.card h2 {
    margin-bottom: 15px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    background: #334155;
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #6366f1, #3b82f6);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
}

/* QR */
.qr-box {
    text-align: center;
    margin-top: 20px;
}

img {
    width: 200px;
    margin-top: 10px;
}

/* DOWNLOAD */
.download-btn button {
    background: linear-gradient(135deg, #22c55e, #16a34a);
}

/* MOBILE */
@media (max-width: 900px) {
    .wrapper {
        flex-direction: column;
    }

    .left {
        padding: 30px;
        text-align: center;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- LEFT -->
    <div class="left">
        <div class="brand">🚀 QuickPay</div>

        <div class="tagline">
            Create UPI QR Codes<br>
            in Seconds.
        </div>

        <div class="subtext">
            Simple, fast and secure QR generator for instant payments.
        </div>

        <div class="features">
            <div class="feature">✅ Instant QR generation</div>
            <div class="feature">✅ Custom amount & notes</div>
            <div class="feature">✅ Download & share easily</div>
            <div class="feature">✅ Works with all UPI apps</div>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="card">
            <h2>Generate QR</h2>

            <form method="POST">
                <input type="text" name="upi_id" placeholder="UPI ID" value="{{ upi_id }}" required>
                <input type="text" name="name" placeholder="Name" value="{{ name }}" required>
                <input type="text" name="amount" placeholder="Amount (optional)" value="{{ amount }}">
                <input type="text" name="note" placeholder="Note (optional)" value="{{ note }}">

                <button type="submit">Generate QR</button>
            </form>

            {% if qr_generated %}
            <div class="qr-box">
                <img src="{{ url_for('static', filename='qr.png') }}?{{ range(1,1000)|random }}">

                <div class="download-btn">
                    <a href="{{ url_for('static', filename='qr.png') }}" download>
                        <button>Download QR</button>
                    </a>
                </div>
            </div>
            {% endif %}
        </div>
    </div>

</div>

</body>
</html>
